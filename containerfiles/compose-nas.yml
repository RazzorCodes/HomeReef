version: "3.8"
name: homereef-nas

volumes:
  media_share:
    driver: local
    driver_opts:
      type: nfs
      o: addr=nas.lan,rw
      device: ":/slow/media"
      
  storage_share:
    driver: local
    driver_opts:
      type: nfs
      o: addr=nas.lan,rw
      device: ":/fast/homereef/transcode"

services:
  homereef-transflux:
    build:
      context: ../transflux/app
      dockerfile: ../transflux/containerfile/homereef-transflux
    container_name: homereef-transflux
    ports:
      - "8000:8000"
    volumes:
      # Use the named NAS volumes instead of host bind mounts
      - storage_share:/storage/homereef-transflux:Z
      - media_share:/media:Z
    environment:
      - PYTHONPATH=/app/src
    restart: unless-stopped

  seaglass:
    build:
      context: ../seaglass
      dockerfile: ../seaglass/Containerfile
    container_name: seaglass
    ports:
      - "5000:5000"
    environment:
      - TRANSFLUX_URL=http://homereef-transflux:8000
    depends_on:
      - homereef-transflux
    restart: unless-stopped
