version: "3.8"
name: local-seaglass-test

services:
  seaglass:
    build:
      context: ../.
      dockerfile: ./containerfiles/Containerfile
    container_name: seaglass
    ports:
      - "5000:5000"
    environment:
      - TRANSFLUX_URL=http://api.transcode.homereef.lan
    restart: unless-stopped