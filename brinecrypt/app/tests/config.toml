# Example configuration file for kube-broadcast
#
# Copy this file and customize for your deployment:
#   cp config.example.toml config.toml
#
# Then start the server with:
#   ./run.sh --config config.toml

# K3s node token
# Can be a direct value or path to a file
#token = "/mnt/data/k3s/node-token"
token = "/home/andrei/git/Razzor-Homelab/containers/kube-broadcast/dev-data/dev-token"
# Or direct value:
#token = "K1234567890abcdefghijklmnop::server:1234567890abcdef"

# SSH admin public key
# Can be a direct value or path to a file
#ssh_admin = "/mnt/data/ssh/admin.pub"
# Or direct value:
ssh_admin = "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAACAQ... admin@example.com"

# SSH agent public key
# Can be a direct value or path to a file
#ssh_agent = "/mnt/data/ssh/agent.pub"
# Or direct value:
ssh_agent = "http://127.0.0.1:9000/" #"ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAACAQ... agent@example.com"

# Note: All parameters are optional. The server will run in degraded mode
# if some parameters are missing, but will log warnings.
#
# If a parameter is not set here, the server will check:
# 1. Environment variables (KUBE_TOKEN, SSH_ADMIN_KEY, SSH_AGENT_KEY)
# 2. Local config file (~/.config/kube-broadcast/config.toml)
# 3. Default paths (/mnt/data/...)
# 4. Default values (empty string)
