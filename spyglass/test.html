<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyglass Test</title>
    <link href="/home/andrei/git/spacesaver/spyglass/src/static/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="app-wrapper">
        <div class="app-container">
            <main class="content-area">
                <section id="library" class="tab-pane active" style="display: flex;">
                    <div class="list-container">
                        <table class="data-table" id="library-table">
                            <thead>
                                <tr>
                                    <th class="col-check"><input type="checkbox" id="check-all"></th>
                                    <th class="col-file">File</th>
                                    <th class="col-status">Status</th>
                                    <th class="col-info">Info</th>
                                </tr>
                            </thead>
                            <tbody id="library-body">
                                <tr>
                                    <td class="col-check"><input type="checkbox" class="row-checkbox" value="123"></td>
                                    <td class="col-file"
                                        title="/data/media/movies/The Matrix (1999)/The Matrix (1999) - 1080p.mkv. Very long file name that should be truncated to test the line clamp CSS property.">
                                        The Matrix (1999) - 1080p.mkv. Very long file name that should be truncated to
                                        test the line clamp CSS property.</td>
                                    <td class="col-status"><span class="status-badge PENDING">PENDING</span></td>
                                    <td class="col-info">1.2 GB | 1080p | h264 | 1920x1080 | AR: 16:9</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>

</html>
