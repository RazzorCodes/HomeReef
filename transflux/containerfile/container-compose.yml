name: homereef-e2e

services:
  homereef:
    build:
      context: ../app
      dockerfile: ../containerfile/homereef-transflux
    ports:
      - "8000:8000"
    volumes:
      - ${WORKDIR_DIR:-../../test-data/homereef-transflux/workdir}:/workdir:rw,z
      - ${MEDIA_DIR:-../../test-data/homereef-transflux/media}:/media:rw,z
      - ${CACHE_DIR:-../../test-data/homereef-transflux/cache}:/cache:rw,z
    environment:
      - TV_CRF=23
      - MOVIE_CRF=23
      - TV_RES_CAP=1080
      - MOVIE_RES_CAP=1080
