version: "3.8"
name: local-spyglass-test

services:
  spyglass:
    build:
      context: ../.
      dockerfile: ./containerfiles/Containerfile
    container_name: spyglass
    ports:
      - "5000:5000"
    environment:
      - TRANSCODER_URL=http://api.transcode.spacesaver.lan
    restart: unless-stopped